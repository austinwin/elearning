<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9"/>
      <stop offset="100%" style="stop-color:#7C5CBF"/>
    </linearGradient>
    <linearGradient id="star" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD54F"/>
      <stop offset="100%" style="stop-color:#FFB300"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="24" y="24" width="464" height="464" rx="110" ry="110" fill="url(#bg)"/>
  <!-- Subtle inner glow -->
  <rect x="24" y="24" width="464" height="464" rx="110" ry="110" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="6"/>
  <!-- Sigma symbol -->
  <text x="256" y="340" font-family="Georgia, 'Times New Roman', serif" font-size="280" font-weight="bold" text-anchor="middle" fill="white">∑</text>
  <!-- Decorative stars -->
  <text x="100" y="130" font-size="48" text-anchor="middle" fill="url(#star)" opacity="0.9">✦</text>
  <text x="400" y="460" font-size="36" text-anchor="middle" fill="url(#star)" opacity="0.8">✦</text>
  <text x="400" y="130" font-size="30" text-anchor="middle" fill="url(#star)" opacity="0.7">✦</text>
  <text x="90" y="440" font-size="40" text-anchor="middle" fill="url(#star)" opacity="0.7">✦</text>
</svg>
